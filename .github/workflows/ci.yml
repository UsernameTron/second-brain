name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci

      - name: Run tests with coverage
        # TODO: Ratchet branches to 90 once branch coverage gaps are closed
        run: npx jest --verbose --coverage --coverageThreshold='{"global":{"branches":70,"functions":90,"lines":90,"statements":90}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      - name: Dependency audit
        run: npm audit --audit-level=high
